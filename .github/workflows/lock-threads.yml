name: Lock Threads

on:
  schedule:
    - cron: '0 3 * * 0'

permissions:
  issues: write
  pull-requests: write

jobs:
  lock:
    name: Lock Old Conversations
    runs-on: ubuntu-latest

    steps:
      - uses: dessant/lock-threads@v6
        with:
          issue-inactive-days: '90'
          pr-inactive-days: '90'
          issue-comment: |
            This thread has been locked. If you have a related issue, please create a new one.
          pr-comment: |
            This thread has been locked. If you have a related concern, please open a new PR or issue.
          log-output: true
