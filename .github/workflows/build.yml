name: Build

on:
  pull_request:
    paths:
      - 'src/**'
      - 'public/**'
      - '*.config.*'
      - 'tsconfig.json'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/build.yml'
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'public/**'
      - '*.config.*'
      - 'tsconfig.json'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/build.yml'

permissions:
  contents: read

jobs:
  build:
    name: Next.js Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build
        env:
          # Skip production type checking (handled by type-check.yml)
          NEXT_TELEMETRY_DISABLED: 1
