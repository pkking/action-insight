name: PR Title Lint

on:
  pull_request_target:
    types:
      - opened
      - edited
      - synchronize
      - reopened

permissions:
  pull-requests: read

jobs:
  pr-title-lint:
    name: Validate PR Title
    runs-on: ubuntu-latest

    steps:
      - name: Validate semantic PR title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          if [[ ! "${PR_TITLE}" =~ ^(feat|fix|docs|style|refactor|test|ci|chore|perf)(\([^)]+\))?:[[:space:]].+ ]]; then
            echo "PR title must use Conventional Commits format."
            echo "Allowed types: feat, fix, docs, style, refactor, test, ci, chore, perf."
            exit 1
          fi

          subject="${PR_TITLE#*:}"
          subject="${subject# }"
          if [[ "${subject}" =~ ^[A-Z] ]]; then
            echo "Subject must not begin with a capital letter."
            exit 1
          fi
