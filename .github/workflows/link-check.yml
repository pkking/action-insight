name: Link Check

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  link-check:
    name: Check Markdown Links
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: 'yes'
          use-verbose-mode: 'yes'
          config-file: '.github/mlc-config.json'
          folder-path: '.'
          file-path: './README.md'
