name: Stale Issues and PRs

on:
  schedule:
    - cron: '0 4 * * *'

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    name: Close Stale Items
    runs-on: ubuntu-latest

    steps:
      - uses: actions/stale@v10
        with:
          days-before-stale: 30
          days-before-close: 7
          stale-issue-message: |
            This issue has been inactive for 30 days. It will be closed in 7 days if no activity occurs.
          stale-pr-message: |
            This PR has been inactive for 30 days. It will be closed in 7 days if no activity occurs.
          close-issue-message: |
            Closed due to inactivity. Please reopen if this is still relevant.
          close-pr-message: |
            Closed due to inactivity. Please reopen if you plan to continue.
          stale-issue-label: stale
          stale-pr-label: stale
          exempt-issue-labels: pinned,security,never-stale
          exempt-pr-labels: pinned,security,never-stale
          exempt-all-milestones: true
          exempt-all-assignees: true
          operations-per-run: 100
