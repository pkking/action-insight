name: Collect CI Data
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
  push:
    paths:
      - 'etl/repos.yaml'
  pull_request:
    paths:
      - 'etl/repos.yaml'

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install tsx @octokit/core date-fns js-yaml
      - id: collect
        continue-on-error: true
        run: npx tsx etl/scripts/collect.ts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RETENTION_DAYS: 90
          VERBOSE: 1
      - if: always()
        run: |
          git config user.name "action-insight-bot"
          git config user.email "bot@action-insight.local"
          git add data/
          git diff --staged --quiet || git commit -m "data: update $(date -u +%Y-%m-%d)"
          git push origin HEAD:${{ github.head_ref || github.ref_name }}
      - if: always() && steps.collect.outcome == 'failure'
        run: |
          echo "Collection completed with partial failures. Successfully collected data has already been pushed."
          exit 1
