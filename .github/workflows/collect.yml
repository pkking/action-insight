name: Collect CI Data
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Restart history backfill from the earliest retained day'
        required: false
        default: false
        type: boolean
      reverse:
        description: 'Collect from today backward instead of oldest-first backfill'
        required: false
        default: false
        type: boolean
      repo_name:
        description: 'Optional owner/repo to collect'
        required: false
        default: ''
        type: string
  push:
    paths:
      - 'etl/repos.yaml'
  pull_request:
    paths:
      - 'etl/repos.yaml'

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install tsx @octokit/core date-fns js-yaml
      - id: collect
        continue-on-error: true
        run: |
          args=()
          if [ "${WORKFLOW_FORCE}" = "true" ]; then
            args+=(--force-full-backfill)
          fi
          if [ "${WORKFLOW_REVERSE}" = "true" ]; then
            args+=(--reverse)
          fi
          if [ -n "${WORKFLOW_REPO_NAME}" ]; then
            args+=(--repo "${WORKFLOW_REPO_NAME}")
          fi
          npx tsx etl/scripts/collect.ts "${args[@]}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RETENTION_DAYS: 90
          VERBOSE: 1
          WORKFLOW_FORCE: ${{ inputs.force }}
          WORKFLOW_REVERSE: ${{ inputs.reverse }}
          WORKFLOW_REPO_NAME: ${{ inputs.repo_name || '' }}
      - if: always()
        run: |
          git config user.name "action-insight-bot"
          git config user.email "bot@action-insight.local"
          git add data/
          git diff --staged --quiet || git commit -m "data: update $(date -u +%Y-%m-%d)"
          git push origin HEAD:${{ github.head_ref || github.ref_name }}
      - if: always() && steps.collect.outcome == 'failure'
        run: |
          echo "Collection completed with partial failures. Successfully collected data has already been pushed."
          exit 1
