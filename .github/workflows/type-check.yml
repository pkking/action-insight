name: Type Check

on:
  pull_request:
    paths:
      - 'src/**'
      - '*.ts'
      - '*.mts'
      - 'tsconfig.json'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/type-check.yml'
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - '*.ts'
      - '*.mts'
      - 'tsconfig.json'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/type-check.yml'

permissions:
  contents: read

jobs:
  type-check:
    name: TypeScript Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Type check
        run: npx tsc --noEmit
